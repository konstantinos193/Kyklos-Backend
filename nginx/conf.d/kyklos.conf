# Blue-Green Deployment Configuration
# ACTIVE_BACKEND will be replaced by deploy script with either 'blue' or 'green'

upstream kyklos_backend {
    server kyklos-backend-green:5000;
    keepalive 32;
}

# HTTP server (for testing - SSL to be configured later)
server {
    listen 80;
    server_name kyklosedu.gr;

    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://kyklos_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Health check endpoint (bypass rate limiting)
    location /api/health {
        proxy_pass http://kyklos_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        access_log off;
    }
}
