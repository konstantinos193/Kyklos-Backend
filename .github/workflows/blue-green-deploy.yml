name: Blue-Green Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Output image tag
        id: image
        run: |
          TAG=$(echo ${{ steps.meta.outputs.tags }} | cut -d: -f2)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Built and pushed image with tag: $TAG"

  deploy-green:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: green
      url: https://your-domain.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Green Environment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/kyklos-backend
            
            # Pull latest image
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image.tag }}
            
            # Stop green container if running
            docker stop kyklos-backend-green || true
            docker rm kyklos-backend-green || true
            
            # Start green container
            docker run -d \
              --name kyklos-backend-green \
              --network kyklos-network \
              --env-file .env.production \
              -e NODE_ENV=production \
              -e PORT=5000 \
              --label deployment.color=green \
              ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image.tag }}
            
            # Wait for health check
            echo "Waiting for green container to be healthy..."
            timeout 120 bash -c 'until docker inspect --format="{{.State.Health.Status}}" kyklos-backend-green | grep -q "healthy"; do sleep 5; done'
            
            echo "Green environment is ready"

  switch-traffic:
    runs-on: ubuntu-latest
    needs: deploy-green
    environment:
      name: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Switch traffic to Green
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/kyklos-backend
            
            # Update nginx to route to green
            sed -i 's/kyklos-backend-blue/kyklos-backend-green/g' nginx/conf.d/kyklos.conf
            docker exec kyklos-nginx nginx -s reload
            
            echo "Traffic switched to green environment"
            
            # Wait for verification
            sleep 30

  cleanup-blue:
    runs-on: ubuntu-latest
    needs: switch-traffic
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cleanup Blue Environment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/kyklos-backend
            
            # Stop blue container
            docker stop kyklos-backend-blue || true
            docker rm kyklos-backend-blue || true
            
            echo "Blue environment cleaned up"
            
            # Prune old images
            docker image prune -af --filter "until=24h"

  rollback:
    runs-on: ubuntu-latest
    needs: switch-traffic
    if: failure()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rollback to Blue
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/kyklos-backend
            
            # Switch back to blue
            sed -i 's/kyklos-backend-green/kyklos-backend-blue/g' nginx/conf.d/kyklos.conf
            docker exec kyklos-nginx nginx -s reload
            
            # Stop green container
            docker stop kyklos-backend-green || true
            docker rm kyklos-backend-green || true
            
            echo "Rolled back to blue environment"
