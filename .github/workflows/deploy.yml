name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            cd /root/kyklos-backend
            
            # Pull latest code
            git pull origin main
            
            # Force remove green container if it exists (regardless of how it was created)
            docker stop kyklos-backend-green || true
            docker rm -f kyklos-backend-green || true
            
            # Build and deploy to green environment
            docker compose --env-file .env.docker build kyklos-backend-green
            docker compose --env-file .env.docker up -d kyklos-backend-green
            
            # Wait for green to be healthy
            echo "Waiting for green container to be healthy..."
            timeout 120 bash -c 'until docker inspect --format="{{.State.Health.Status}}" kyklos-backend-green 2>/dev/null | grep -q "healthy"; do sleep 5; done'
            
            # Switch traffic to green
            sed -i 's/kyklos-backend-ACTIVE_BACKEND/kyklos-backend-green/g' nginx/conf.d/kyklos.conf
            docker compose --env-file .env.docker restart nginx
            
            # Wait for nginx to reload
            sleep 5
            
            # Verify green is serving traffic
            curl -f http://localhost/api/health || exit 1
            
            # Cleanup blue environment
            docker compose --env-file .env.docker stop kyklos-backend-blue || true
            docker compose --env-file .env.docker rm -f kyklos-backend-blue || true
            
            echo "Deployment completed successfully"
