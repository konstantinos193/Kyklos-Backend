name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          provenance: false

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/kyklos-backend
            
            # Pull latest image
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            
            # Stop green container if running
            docker stop kyklos-backend-green || true
            docker rm kyklos-backend-green || true
            
            # Start green container
            docker run -d \
              --name kyklos-backend-green \
              --network kyklos-network \
              --env-file .env.docker \
              -e NODE_ENV=production \
              -e PORT=5000 \
              -v kyklos-backend_public-files:/app/public \
              ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            
            # Wait for health check
            echo "Waiting for green container to be healthy..."
            timeout 120 bash -c 'until docker inspect --format="{{.State.Health.Status}}" kyklos-backend-green | grep -q "healthy"; do sleep 5; done'
            
            # Switch traffic to green
            sed -i 's/kyklos-backend-ACTIVE_BACKEND/kyklos-backend-green/g' nginx/conf.d/kyklos.conf
            docker compose --env-file .env.docker restart nginx
            
            # Wait for nginx to reload
            sleep 5
            
            # Verify green is serving traffic
            curl -f http://localhost/health || exit 1
            
            # Cleanup blue environment
            docker stop kyklos-backend-blue || true
            docker rm kyklos-backend-blue || true
            
            echo "Deployment completed successfully"
