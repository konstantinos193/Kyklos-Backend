version: '3.8'

services:
  # Blue environment (current production)
  kyklos-backend-blue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kyklos-backend-blue
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
    env_file:
      - .env.docker
    networks:
      - kyklos-network
    volumes:
      - public-files:/app/public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kyklos-blue.rule=Host(`your-domain.com`)"
      - "traefik.http.routers.kyklos-blue.entrypoints=websecure"
      - "traefik.http.routers.kyklos-blue.tls=true"
      - "traefik.http.services.kyklos-blue.loadbalancer.server.port=5000"
      - "deployment.color=blue"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Green environment (new version)
  kyklos-backend-green:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kyklos-backend-green
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
    env_file:
      - .env.docker
    networks:
      - kyklos-network
    volumes:
      - public-files:/app/public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kyklos-green.rule=Host(`your-domain.com`)"
      - "traefik.http.routers.kyklos-green.entrypoints=websecure"
      - "traefik.http.routers.kyklos-green.tls=true"
      - "traefik.http.services.kyklos-green.loadbalancer.server.port=5000"
      - "deployment.color=green"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx reverse proxy for blue/green switching
  nginx:
    image: nginx:alpine
    container_name: kyklos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - kyklos-network

  # MongoDB for production (in-house)
  mongodb:
    image: mongo:7.0
    container_name: kyklos-mongodb
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: kyklos_db
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    networks:
      - kyklos-network
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis for caching and sessions (in-house)
  redis:
    image: redis:7-alpine
    container_name: kyklos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - kyklos-network
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  kyklos-network:
    driver: bridge

volumes:
  mongodb-data:
    driver: local
  mongodb-config:
    driver: local
  redis-data:
    driver: local
  public-files:
    driver: local
